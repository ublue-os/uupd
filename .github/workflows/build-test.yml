name: integration testing
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  merge_group:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  push-ghcr:
    if: false # we can fix this action later, likely using something like test.thing or so
    name: Build and test image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        major_version: [43, 44]
        include:
          - major_version: 43
            is_latest_version: false
            is_stable_version: true
          - major_version: 44
            is_latest_version: true
            is_stable_version: false
    steps:
      # Checkout push-to-registry action GitHub repository
      - name: Checkout Push to Registry action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Deps
        run: |
          sudo apt-get install just podman

      - name: Build Image
        id: build_image
        env:
          FEDORA_MAJOR_VERSION: ${{ matrix.major_version }}
        run: |
          just container-build

      - name: Test Image
        id: test_image
        run: |
          just container-test
